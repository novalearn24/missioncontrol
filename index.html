<!DOCTYPE html>
<html>
<head>
    <title>AI Mission Control v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; }
        #webcam { width: 320px; border-radius: 20px; border: 4px solid #3b82f6; display: none; margin: 0 auto; transform: scaleX(-1); }
        .box { display: inline-block; width: 120px; padding: 20px; margin: 10px; border-radius: 15px; opacity: 0.1; font-weight: 800; border: 2px solid rgba(255,255,255,0.1); }
        .active { opacity: 1; transform: scale(1.1); box-shadow: 0 0 20px #3b82f6; border-color: white; }
        #box-0 { background: #a4c639; color: #1a1a2e; }
        #box-1 { background: #e94e24; }
        .btn { padding: 15px 25px; margin: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; background: #2563eb; color: white; }
        #log { background: #1e293b; padding: 15px; height: 120px; overflow-y: auto; margin: 20px auto; max-width: 500px; font-family: monospace; font-size: 12px; text-align: left; color: #4ade80; border-radius: 10px; }
    </style>
</head>
<body>

    <h2>🛰️ AI MISSION CONTROL</h2>
    <button id="init-btn" class="btn" style="background:#8b5cf6; font-size:1.5rem;" onclick="startEverything()">1. START CAMERA & AI</button>

    <video autoplay playsinline muted id="webcam"></video>
    <div id="status" style="margin: 15px; color: #94a3b8;">Status: Waiting...</div>

    <div id="controls" style="display:none;">
        <button class="btn" onclick="connectBT()">🔗 2. CONNECT MICRO:BIT</button>
        <button class="btn" style="background:#4b5563" onclick="document.getElementById('loader').click()">📂 3. UPLOAD .JSON</button>
        <input type="file" id="loader" style="display:none" onchange="loadModel(event)">
    </div>

    <div style="margin-top:20px;">
        <div id="box-0" class="box">CLASS A<br>("me")</div>
        <div id="box-1" class="box">CLASS B<br>("wamao")</div>
    </div>

    <div id="log">Logs: Please click the purple button.</div>

    <script>
        let net, classifier, uartChar;
        let lastSent = "";
        let isSending = false;
        const video = document.getElementById('webcam');

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += "> " + msg + "<br>";
            l.scrollTop = l.scrollHeight;
        }

        async function startEverything() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = "block";
                log("Camera Active.");
                net = await mobilenet.load();
                classifier = knnClassifier.create();
                log("AI Brain Ready.");
                document.getElementById('init-btn').style.display = 'none';
                document.getElementById('controls').style.display = 'block';
                loop();
            } catch (e) { log("Error: " + e.message); }
        }

        async function connectBT() {
            try {
                log("Searching for any Micro:bit...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                uartChar = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                log("✅ CONNECTED! Happy Face should show.");
            } catch (e) { log("Connection Failed: " + e.message); }
        }

        async function loadModel(event) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const model = JSON.parse(e.target.result);
                const ds = {};
                Object.keys(model.data).forEach(k => {
                    ds[k] = tf.tensor2d(model.data[k], [model.data[k].length/1024, 1024]);
                });
                classifier.setClassifierDataset(ds);
                log("✅ JSON Model Active.");
            };
            reader.readAsText(event.target.files[0]);
        }

        async function loop() {
            if (classifier && classifier.getNumClasses() > 0 && video.readyState >= 2) {
                const img = tf.browser.fromPixels(video);
                const activation = net.infer(img, 'conv_preds');
                const result = await classifier.predictClass(activation);
                img.dispose();

                const id = result.label;
                document.getElementById('box-0').classList.toggle('active', id == 0);
                document.getElementById('box-1').classList.toggle('active', id == 1);

                let signal = (id == 0) ? "me" : "wamao";
                if (signal !== lastSent && !isSending) {
                    sendData(signal + "\n");
                    lastSent = signal;
                }
            }
            requestAnimationFrame(loop);
        }

        async function sendData(msg) {
            if (!uartChar || isSending) return;
            isSending = true;
            try {
                // Using writeValue (Fastest/Lofi-style)
                await uartChar.writeValue(new TextEncoder().encode(msg));
                log("Sent: " + msg.trim());
            } catch (e) { log("Blocked: " + e.message); }
            setTimeout(() => { isSending = false; }, 400); // 400ms breath for the Micro:bit
        }
    </script>
</body>
</html>
