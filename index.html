<!DOCTYPE html>
<html>
<head>
    <title>AI Robot - v4.1 Final Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; text-align: center; background: #0a101e; color: #00ffcc; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; border: 1px solid #00ffcc; padding: 20px; border-radius: 10px; }
        .control-panel { background: #111b33; padding: 20px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 20px; }
        .btn { padding: 15px 25px; margin: 8px; border-radius: 5px; border: 1px solid #00ffcc; cursor: pointer; font-weight: bold; color: #00ffcc; background: transparent; font-size: 1rem; text-transform: uppercase; }
        .btn:hover { background: #00ffcc; color: #0a0f1e; box-shadow: 0 0 15px #00ffcc; }
        .btn-main { width: 100%; font-size: 1.2rem; margin-bottom: 15px; border-width: 2px; }
        #webcam { width: 320px; border-radius: 10px; border: 2px solid #00ffcc; transform: scaleX(-1); background: #000; margin: 10px auto; display: block; }
        .box-container { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .box { width: 150px; padding: 20px; border-radius: 5px; opacity: 0.2; font-weight: 800; border: 1px solid #00ffcc; }
        .active { opacity: 1; background: rgba(0, 255, 204, 0.2); box-shadow: 0 0 20px #00ffcc; }
        #log { background: #000; padding: 15px; height: 220px; overflow-y: auto; margin: 25px auto; max-width: 600px; font-size: 12px; text-align: left; color: #00ffcc; border: 1px solid #00ffcc; }
    </style>
</head>
<body>

    <div class="container">
        <h2>>> AI_UART_SYNC_v4.1</h2>

        <div class="control-panel">
            <button class="btn btn-main" onclick="startCamera()">[01] Initialize AI & Camera</button>
            <br>
            <button class="btn" onclick="connectBT()">[02] Sync Bluetooth</button>
            <button class="btn" onclick="document.getElementById('loader').click()">[03] Load Neural Map</button>
            <input type="file" id="loader" style="display:none" onchange="loadModel(event)">
        </div>

        <video autoplay playsinline muted id="webcam"></video>
        
        <div class="box-container">
            <div id="box-0" class="box">CLASS: ME<br>(Send "me:")</div>
            <div id="box-1" class="box">CLASS: WAMAO<br>(Send "wamao:")</div>
        </div>

        <div id="log">Waiting for system start...</div>
    </div>

    <script>
        let net, classifier, uartChar;
        let lastSent = "";
        let isSending = false;

        const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const UART_RX_CHARACTERISTIC = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += "> " + msg + "<br>";
            l.scrollTop = l.scrollHeight;
        }

        async function startCamera() {
            log("Opening camera stream...");
            try {
                const video = document.getElementById('webcam');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                log("Loading AI Brain...");
                net = await mobilenet.load();
                classifier = knnClassifier.create();
                log("AI Engine Ready.");
                requestAnimationFrame(loop);
            } catch (e) { log("CAMERA ERROR: " + e.message); }
        }

        async function connectBT() {
            try {
                log("Searching for BBC micro:bit...");
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [UART_SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                uartChar = await service.getCharacteristic(UART_RX_CHARACTERISTIC);
                log("✅ BLUETOOTH CONNECTED.");
            } catch (e) { log("BT FAIL: " + e.message); }
        }

        async function loadModel(event) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const modelJson = JSON.parse(e.target.result);
                    const ds = {};
                    Object.keys(modelJson.data).forEach(k => {
                        ds[k] = tf.tensor2d(modelJson.data[k], [modelJson.data[k].length/1024, 1024]);
                    });
                    classifier.setClassifierDataset(ds);
                    log("✅ NEURAL MAP ACTIVE.");
                } catch(err) { log("JSON ERROR: File corrupted."); }
            };
            reader.readAsText(event.target.files[0]);
        }

        async function loop() {
            const video = document.getElementById('webcam');
            if (classifier && classifier.getNumClasses() > 0 && video.readyState >= 2) {
                const img = tf.browser.fromPixels(video);
                const activation = net.infer(img, 'conv_preds');
                const result = await classifier.predictClass(activation);
                img.dispose();

                const id = result.label;
                document.getElementById('box-0').classList.toggle('active', id == 0);
                document.getElementById('box-1').classList.toggle('active', id == 1);

                // MATCHING YOUR BLOCKS EXACTLY: "me" and "wamao"
                let signal = (id == 0) ? "me" : "wamao";
                
                if (signal !== lastSent && !isSending) {
                    sendData(signal + ":");
                    lastSent = signal;
                }
            }
            requestAnimationFrame(loop);
        }

        async function sendData(msg) {
            if (!uartChar || isSending) return;
            isSending = true;
            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(msg);
                // Using writeValueWithoutResponse to ensure Mac doesn't block
                await uartChar.writeValueWithoutResponse(data);
                log("SENT TO MICROBIT: " + msg);
            } catch (e) {
                log("BT SEND ERROR: " + e.message);
                // If it fails, try to re-bind characteristic
                uartChar = null; 
            }
            // Cooldown to prevent flooding the 60-byte Micro:bit buffer
            setTimeout(() => { isSending = false; }, 800);
        }
    </script>
</body>
</html>
