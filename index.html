<!DOCTYPE html>
<html>
<head>
    <title>AI Robot Dashboard - Final Binary Build</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; }
        .control-panel { background: #1e293b; padding: 20px; border-radius: 20px; border: 2px solid #334155; margin-bottom: 20px; }
        .btn { padding: 15px 25px; margin: 10px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; color: white; font-size: 1rem; }
        .btn-purple { background: #8b5cf6; }
        .btn-blue { background: #2563eb; }
        .btn-gray { background: #4b5563; }
        #webcam { width: 320px; border-radius: 20px; border: 4px solid #3b82f6; transform: scaleX(-1); margin-top: 10px; background: #000; }
        .box-container { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .box { width: 140px; padding: 20px; border-radius: 15px; opacity: 0.2; font-weight: 800; border: 2px solid rgba(255,255,255,0.1); transition: 0.1s; }
        .active { opacity: 1; transform: scale(1.1); box-shadow: 0 0 20px #3b82f6; border-color: white; }
        #box-0 { background: #a4c639; color: #1a1a2e; } 
        #box-1 { background: #e94e24; }
        #log { background: #000; padding: 15px; height: 150px; overflow-y: auto; margin: 20px auto; max-width: 500px; font-family: monospace; font-size: 11px; text-align: left; color: #4ade80; border-radius: 10px; border: 1px solid #334155; }
    </style>
</head>
<body>

    <h2>🛰️ AI MISSION CONTROL</h2>

    <div class="control-panel">
        <button class="btn btn-purple" onclick="startCamera()">1. START CAMERA & AI</button>
        <button class="btn btn-blue" onclick="connectBT()">2. CONNECT MICRO:BIT</button>
        <button class="btn btn-gray" onclick="document.getElementById('loader').click()">3. UPLOAD MODEL (.JSON)</button>
        <input type="file" id="loader" style="display:none" onchange="loadModel(event)">
    </div>

    <video autoplay playsinline muted id="webcam"></video>
    
    <div class="box-container">
        <div id="box-0" class="box">CLASS: ME<br>(Pins P0 -> 0°)</div>
        <div id="box-1" class="box">CLASS: WAMAO<br>(Pins P0 -> 90°)</div>
    </div>

    <div id="log">Logs: Ready to initialize.</div>

    <script>
        let net, classifier, uartChar;
        let lastSent = "";
        let isSending = false;
        const video = document.getElementById('webcam');

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += "> " + msg + "<br>";
            l.scrollTop = l.scrollHeight;
        }

        // STEP 1: CAMERA & AI
        async function startCamera() {
            log("Requesting Camera...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                log("✅ Camera Active");
                log("Loading MobileNet... (please wait)");
                net = await mobilenet.load();
                classifier = knnClassifier.create();
                log("✅ AI READY");
                loop();
            } catch (e) { log("❌ Camera Error: " + e.message); }
        }

        // STEP 2: BLUETOOTH (BINARY MODE)
        async function connectBT() {
            try {
                log("Opening Bluetooth selector...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                uartChar = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                log("✅ CONNECTED TO HARDWARE!");
            } catch (e) { log("❌ BT Error: " + e.message); }
        }

        // STEP 3: UPLOAD JSON
        async function loadModel(event) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const model = JSON.parse(e.target.result);
                    const ds = {};
                    Object.keys(model.data).forEach(k => {
                        ds[k] = tf.tensor2d(model.data[k], [model.data[k].length/1024, 1024]);
                    });
                    classifier.setClassifierDataset(ds);
                    log("✅ AI Model Loaded successfully!");
                } catch(err) { log("❌ JSON Error: Check your file."); }
            };
            reader.readAsText(event.target.files[0]);
        }

        // PREDICTION LOOP
        async function loop() {
            if (classifier && classifier.getNumClasses() > 0 && video.readyState >= 2) {
                const img = tf.browser.fromPixels(video);
                const activation = net.infer(img, 'conv_preds');
                const result = await classifier.predictClass(activation);
                img.dispose();

                const id = result.label;
                document.getElementById('box-0').classList.toggle('active', id == 0);
                document.getElementById('box-1').classList.toggle('active', id == 1);

                let signal = (id == 0) ? "me" : "wamao";
                if (signal !== lastSent && !isSending) {
                    sendRawBinary(signal);
                    lastSent = signal;
                }
            }
            requestAnimationFrame(loop);
        }

        // --- THE BINARY FIX ---
        async function sendRawBinary(command) {
            if (!uartChar || isSending) return;
            isSending = true;

            try {
                let data;
                if (command === "me") {
                    // ASCII: m(109), e(101), NewLine(10)
                    data = new Uint8Array([109, 101, 10]);
                } else {
                    // ASCII: w(119), a(97), m(109), a(97), o(111), NewLine(10)
                    data = new Uint8Array([119, 97, 109, 97, 111, 10]);
                }

                log("Sending Bytes: " + data.join(','));
                
                // WriteValueWithoutResponse is the most "permissive" write mode on Mac
                await uartChar.writeValueWithoutResponse(data);
                
            } catch (e) {
                log("Write Failed: " + e.message);
            }

            // Small delay to prevent crashing the Micro:bit's buffer
            setTimeout(() => { isSending = false; }, 600);
        }
    </script>
</body>
</html>
